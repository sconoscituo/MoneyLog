<!DOCTYPE html>
<html lang="ko" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MoneyLog{% endblock %} - 가계부</title>

  <!-- Tailwind CSS CDN (다크모드 class 전략 활성화) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 50:'#f0f9ff', 100:'#e0f2fe', 500:'#0ea5e9', 600:'#0284c7', 700:'#0369a1' },
          }
        }
      }
    }
  </script>

  <!-- 다크모드 깜빡임 방지: 페이지 로드 직후 클래스 적용 -->
  <script>
    (function() {
      if (localStorage.getItem('darkMode') === 'true') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- 공통 스타일 -->
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-200">

  <!-- 네비게이션 바 -->
  <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- 로고 -->
        <a href="/" class="flex items-center gap-2 font-bold text-xl text-sky-600 dark:text-sky-400">
          <span class="text-2xl">💸</span>
          MoneyLog
        </a>

        <!-- 네비게이션 링크 + 다크모드 토글 -->
        <div class="flex items-center gap-1">
          <a href="/"
             class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-colors
                    {% if request.url.path == '/' %}bg-sky-50 dark:bg-sky-900/30 text-sky-700 dark:text-sky-400{% else %}text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %}">
            🏠 대시보드
          </a>
          <a href="/expenses"
             class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-colors
                    {% if request.url.path == '/expenses' %}bg-sky-50 dark:bg-sky-900/30 text-sky-700 dark:text-sky-400{% else %}text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %}">
            📝 지출 내역
          </a>
          <a href="/reports"
             class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-colors
                    {% if request.url.path == '/reports' %}bg-sky-50 dark:bg-sky-900/30 text-sky-700 dark:text-sky-400{% else %}text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %}">
            📊 리포트
          </a>
          <a href="/recurring"
             class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-colors
                    {% if request.url.path == '/recurring' %}bg-sky-50 dark:bg-sky-900/30 text-sky-700 dark:text-sky-400{% else %}text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %}">
            🔄 반복 지출
          </a>

          <!-- 다크모드 토글 버튼 -->
          <button id="darkModeToggle" onclick="toggleDarkMode()"
                  class="ml-2 p-2 rounded-lg border border-gray-200 dark:border-gray-600
                         text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700
                         transition-colors text-base"
                  title="다크모드 전환">
            <span id="darkModeIcon">🌙</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 메인 컨텐츠 -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% if error %}
      <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-6 text-center">
        <p class="text-red-600 dark:text-red-400 font-medium">{{ error }}</p>
        <a href="/" class="mt-3 inline-block text-sm text-sky-600 dark:text-sky-400 hover:underline">홈으로 돌아가기</a>
      </div>
    {% else %}
      {% block content %}{% endblock %}
    {% endif %}
  </main>

  <!-- 공통 JS -->
  <script src="/static/js/app.js"></script>

  <!-- 다크모드 토글 스크립트 -->
  <script>
    // 페이지 로드 시 아이콘 동기화
    (function() {
      const isDark = localStorage.getItem('darkMode') === 'true';
      document.getElementById('darkModeIcon').textContent = isDark ? '☀️' : '🌙';
    })();

    function toggleDarkMode() {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('darkMode', isDark);
      document.getElementById('darkModeIcon').textContent = isDark ? '☀️' : '🌙';
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
